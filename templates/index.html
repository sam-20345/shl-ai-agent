<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHL AI Assessment Recommender</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:#f4f6f9;
}

.header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:140px;
padding:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:none;
}

button{
margin-top:20px;
padding:14px 30px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.card{
margin-top:30px;
background:#f9fafb;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
}

.assessment{
padding:15px;
margin-top:15px;
border-radius:8px;
background:white;
border-left:5px solid #2563eb;
}

a{
color:#2563eb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

SHL AI Assessment Recommender

</div>

<div class="container">

<h2>Describe your hiring requirement</h2>

<textarea id="prompt"
placeholder="Example:
I need a Java Developer with Spring Boot and SQL experience."></textarea>

<br>

<button onclick="sendPrompt()">

Get Recommendations

</button>

<div id="result"></div>

</div>

<script>

async function sendPrompt(){

let prompt=document.getElementById("prompt").value;

const response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

messages:[
{
role:"user",
content:prompt
}
]

})

});

const data=await response.json();

let html="<div class='card'>";

html+="<h3>Assistant</h3>";

html+="<p>"+data.reply+"</p>";

if(data.recommendations.length){

html+="<h3>Recommendations</h3>";

data.recommendations.forEach(r=>{

html+=`
<div class="assessment">

<b>${r.name}</b>

<br><br>

Type:
${r.test_type}

<br><br>

<a href="${r.url}" target="_blank">

Open SHL Assessment

</a>

</div>
`;

});

}

html+="</div>";

document.getElementById("result").innerHTML=html;

}

</script>

</body>

</html>
